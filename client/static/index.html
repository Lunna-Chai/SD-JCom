<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JCommit Protocol Demo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px;}
        .container { max-width: 1000px; margin: 0 auto; display: flex; gap: 20px;}
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 50%; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px;}
        button { background-color: #3498db; color: white; border: none; padding: 10px 15px; margin: 10px 0; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px;}
        button:hover { background-color: #2980b9;}
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        pre { background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 5px; overflow-x: auto; white-space: pre-wrap; font-size: 14px;}
        .log-entry { margin-bottom: 15px; border-left: 3px solid #e74c3c; padding-left: 10px;}
        .success { border-left-color: #2ecc71;}
    </style>
</head>
<body>
    <div style="text-align: center; margin-bottom: 20px;">
        <h1 style="color:#2c3e50">JSON Credential (JCommit) Protocol Demo</h1>
        <p>Browser triggers steps -> Rust backend handles cryptographic computation -> Visual feedback</p>
    </div>

    <div class="container">
        <!-- Left: action panel -->
        <div class="panel">
            <h2>Protocol Steps</h2>
            <button id="btn1" onclick="runStep(1, '/api/step1_request')">Step 1: Request data from server and obtain blinding scalar Z</button>
            <button id="btn2" onclick="runStep(2, '/api/step2_verify')" disabled>Step 2: Verify server signature on Z</button>
            <button id="btn3" onclick="runStep(3, '/api/step3_compute')" disabled>Step 3: Client locally computes commitment using Z</button>
            <button id="btn4" onclick="runStep(4, '/api/step4_submit')" disabled>Step 4: Submit commitment to server for credential issuance</button>
        </div>

        <!-- Right: data and log display -->
        <div class="panel">
            <h2>Live Protocol Log</h2>
            <div id="log-container">
                <div class="log-entry" style="border-left-color:#3498db">Waiting for request...</div>
            </div>
        </div>
    </div>

    <script>
        async function runStep(stepId, apiUrl) {
            const btn = document.getElementById('btn' + stepId);
            const container = document.getElementById('log-container');
            
            btn.innerHTML = "Running...";
            btn.disabled = true;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                // Render formatted log entry
                const logDiv = document.createElement('div');
                logDiv.className = data.status === 'success' ? 'log-entry success' : 'log-entry';
                
                let logContent = `<strong>Step ${stepId}:</strong><br/>`;
                if(stepId === 1 && data.status === 'success') {
                    // Display prettified JSON
                    let prettyJSON = JSON.stringify(JSON.parse(data.json), null, 2);
                    logContent += `<p>Server blinding scalar Z:</p><pre>${data.z.substring(0,20)}...</pre>`;
                    logContent += `<p>Received data (JSON):</p><pre>${prettyJSON}</pre>`;
                } else if(stepId === 3 && data.status === 'success') {
                    logContent += `<p>Credential commitment computed from JSON tree and Z (Hex):</p><pre>${data.commitment.substring(0,40)}...</pre>`;
                } else if(stepId === 4 && data.status === 'success') {
          logContent += `<p>${data.message}</p><p>Server signature:</p><pre>${data.signature}</pre>`;
        } else {
                    logContent += `<p>${data.message || JSON.stringify(data)}</p>`;
                }

                logDiv.innerHTML = logContent;
                container.prepend(logDiv); // Newest log entry on top

                // Unlock next step
                if(data.status === 'success' && stepId < 4) {
                    document.getElementById('btn' + (stepId + 1)).disabled = false;
                }
                btn.innerHTML = `Step ${stepId} (Done)`;
                btn.style.backgroundColor = "#2ecc71";

            } catch (err) {
                console.error(err);
                btn.innerHTML = `Step ${stepId} (Network Error)`;
                btn.style.backgroundColor = "#e74c3c";
            }
        }
    </script>
</body>
</html>
